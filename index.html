<title>Salmon Run</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#3d5a3a;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Gaegu',cursive;}
  #gc{position:relative;width:720px;height:720px;border-radius:14px;overflow:hidden;box-shadow:0 0 40px rgba(60,90,60,0.5);cursor:none;border:3px solid #5c4033;}
  canvas{display:block;width:100%;height:100%;}
  #hud{position:absolute;top:0;left:0;right:0;padding:8px 125px;pointer-events:none;z-index:10;}
  .hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .ht{color:#f5eed6;font-size:19px;font-weight:700;text-shadow:1px 1px 3px rgba(60,40,20,0.8);}
  #hpO{width:100%;height:20px;background:rgba(60,40,20,0.45);border-radius:10px;overflow:hidden;position:relative;border:2px solid rgba(92,64,51,0.6);}
  #hpI{height:100%;width:100%;border-radius:8px;transition:width .15s ease,background-color .3s ease;}
  #hpT{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;color:#f5eed6;font-size:13px;font-weight:700;text-shadow:1px 1px 2px rgba(60,40,20,0.9);}
  .so{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:auto;cursor:default;}
  #ts{background:linear-gradient(180deg,rgba(61,90,58,0.95),rgba(45,70,42,0.97));}
  #ts h1{font-size:56px;color:#f5eed6;margin-bottom:6px;text-shadow:2px 2px 0 #5c4033;}
  #ts .fi{font-size:72px;margin-bottom:10px;}
  #ts .st{font-size:20px;color:#a3c5a0;margin-bottom:32px;}
  #ts .pr{font-size:22px;color:#e8c170;animation:pu 1.5s ease-in-out infinite;}
  .ch{color:#8ba67c;font-size:14px;margin-top:18px;text-align:center;line-height:1.7;}
  #ps{background:rgba(45,60,40,0.85);}
  #ps h2{font-size:52px;color:#e8c170;text-shadow:2px 2px 0 #5c4033;}
  #gs{background:rgba(40,55,38,0.94);}
  #gs .sn{font-size:72px;font-weight:700;color:#e8c170;text-shadow:2px 2px 0 #5c4033;line-height:1;}
  #gs .sl{font-size:20px;color:#a3c5a0;margin-bottom:4px;}
  #gs .sb{font-size:16px;color:#8ba67c;margin-top:2px;}
  #gs .dv{width:100px;height:2px;background:rgba(139,166,124,0.4);margin:14px auto;}
  #gs .st2{color:#d4c9a8;font-size:16px;margin:3px 0;}
  #gs .st2 span{color:#e8c170;font-weight:700;}
  #gs .hl{color:#a3c5a0;font-size:24px;font-weight:700;margin-top:14px;}
  #gs .pr{color:#8ba67c;font-size:17px;margin-top:18px;animation:pu 1.5s ease-in-out infinite;}
  @keyframes pu{0%,100%{opacity:1;}50%{opacity:.4;}}
  #bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;box-shadow:inset 0 0 50px rgba(232,193,112,0.6);opacity:0;transition:opacity .2s;border-radius:12px;}

  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:0.8;}}
</style>

function dSp(k,x,y,w,h,em,sz){if(sp[k])ctx.drawImage(sp[k],x-w/2,y-h/2,w,h);else{ctx.font=`${sz||Math.max(w,h)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,x,y);}}

// ══ CONFIG ══
const C={
  W:600,H:600,BANK:110,BASE_SCROLL:3.5,PARTICLE_MAX:20,
  P_SPEED:6,P_HITBOX:20,P_SIZE:68,P_Y:0.75,INVINCIBLE_MS:1000,
  HP_MAX:100,HP_DECAY:2,HP_ROCK_DMG:20,
  AVO_SPAWN_MIN:2.5,AVO_SPAWN_MAX:4,SAKE_SPAWN_MIN:6.4,SAKE_SPAWN_MAX:10.4,
  SAKE_HP_HEAL:27,SAKE_BOOST_MS:3000,SAKE_SPEED_MULT:1.5,
  OBS_RATIO:{rock:0.70,hook:0.20,bear:0.10},
  HOOK_STUN_MS:3000,
  PX_PER_M:10,SCORE_PER_M:1,SCORE_AVO:100,SCORE_DESTROY:30,
  ITEM_SIZE:40,SAKE_SIZE:50,ROCK_MIN:45,ROCK_MAX:80,
  BEAR_SIZE:70,HOOK_SIZE:55,  // 곰/낚싯바늘 크기
  DIFF:[
    {dist:0,spd:1.0,spn:1.6,decay:2.0},
    {dist:400,spd:1.2,spn:1.2,decay:2.5},
    {dist:1000,spd:1.5,spn:0.8,decay:3.0},
    {dist:1800,spd:1.8,spn:0.5,decay:3.5},
    {dist:3000,spd:2.0,spn:0.4,decay:4.0},
    {dist:5000,spd:2.2,spn:0.35,decay:4.5},
  ],
};
const RL=C.BANK,RR=C.W-C.BANK,RW=RR-RL;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let phase='title',lt=0;

const G={
  px:C.W/2,py:C.H*C.P_Y,
  mouseX:C.W/2,mouseIn:false,keys:{},
  hp:C.HP_MAX,dist:0,score:0,sOff:0,
  obs:[],items:[],parts:[],pops:[],
  boostT:0,stunT:0,invT:0,canRestart:true,
  obsSpn:0,avoSpn:0,sakeSpn:0,
  st:{avo:0,sake:0,dest:0},hs:0,
};

function getDiff(){let c=C.DIFF[0];for(const l of C.DIFF)if(G.dist>=l.dist)c=l;return c;}
function loadHS(){try{return Number(localStorage.getItem('sr-hs'))||0}catch(e){return 0}}
function saveHS(s){try{localStorage.setItem('sr-hs',String(s))}catch(e){}}

// ══ INPUT ══
document.addEventListener('keydown',e=>{if(e.code==='Space'&&(phase==='title'||(phase==='gameover'&&G.canRestart))){e.preventDefault();start();}if(e.code==='Space'&&phase==='paused'){e.preventDefault();pause();}if((e.code==='Escape'||e.code==='KeyP')&&phase==='playing')pause();if(e.code==='Space')e.preventDefault();});
document.addEventListener('keyup',e=>{G.keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();G.mouseX=(e.clientX-r.left)*(C.W/r.width);G.mouseIn=true;});
cv.addEventListener('mouseleave',()=>{G.mouseIn=false;});
document.getElementById('gc').addEventListener('click',()=>{if(phase==='title'||(phase==='gameover'&&G.canRestart))start();if(phase==='paused')pause();});

// ══ GAME CONTROL ══
function start(){
  G.px=C.W/2;G.py=C.H*C.P_Y;G.hp=C.HP_MAX;G.dist=0;G.score=0;G.sOff=0;
  G.obs=[];G.items=[];G.parts=[];G.pops=[];
  G.boostT=0;G.stunT=0;G.invT=0;G.obsSpn=0;
  G.avoSpn=rR(C.AVO_SPAWN_MIN,C.AVO_SPAWN_MAX);
  G.sakeSpn=rR(C.SAKE_SPAWN_MIN,C.SAKE_SPAWN_MAX);
  G.st={avo:0,sake:0,dest:0};G.hs=loadHS();
  phase='playing';$('ts').style.display='none';$('gs').style.display='none';
  $('hud').style.display='block';$('gc').style.cursor='none';lt=performance.now();
}
function pause(){
  if(phase==='playing'){phase='paused';$('ps').style.display='flex';$('gc').style.cursor='default';}
  else if(phase==='paused'){phase='playing';$('ps').style.display='none';$('gc').style.cursor='none';lt=performance.now();}
}
function gOver(){
  phase='gameover';$('gc').style.cursor='default';
  G.canRestart=false;
  const baseScore=Math.floor(G.score);
  const avoBonus=G.st.avo*C.SCORE_AVO;
  const finalScore=baseScore+avoBonus;
  const nw=finalScore>G.hs;if(nw){G.hs=finalScore;saveHS(finalScore);}
  $('hud').style.display='none';$('bg').style.opacity='0';
  $('gsn').textContent=baseScore.toLocaleString();
  $('gsb').textContent=Math.floor(G.dist)+'m traveled';
  $('gst').innerHTML=`<div class="st2"><img src="${SS.avocado}" style="width:22px;height:22px;vertical-align:middle;"> Avocados: <span>${G.st.avo}</span></div><div class="st2"><img src="${SS.sake}" style="width:22px;height:22px;vertical-align:middle;"> Sake: <span>${G.st.sake}</span></div><div class="st2">💥 Destroyed: <span>${G.st.dest}</span></div>`;
  $('ghl').textContent='';
  $('avoAnim').style.opacity='0';
  $('retryMsg').style.opacity='0';
  $('gs').style.display='flex';
  // 1초 후 아보카도 보너스 드르르륵 애니메이션
  setTimeout(()=>{
    if(avoBonus<=0){finishScore(baseScore,nw);return;}
    $('avoAnim').style.opacity='1';
    let cur=0;const step=Math.max(1,Math.ceil(avoBonus/60));
    const roll=setInterval(()=>{
      cur=Math.min(cur+step,avoBonus);
      $('avoNum').textContent=cur.toLocaleString();
      $('gsn').textContent=(baseScore+cur).toLocaleString();
      if(cur>=avoBonus){clearInterval(roll);finishScore(finalScore,nw);}
    },30);
  },1000);
}
function finishScore(score,isNew){
  // 이펙트
  const el=$('gsn');
  el.style.transition='transform 0.3s,color 0.3s';
  el.style.transform='scale(1.3)';
  setTimeout(()=>{el.style.transform='scale(1)';},300);
  if(isNew){
    // 최고점수 화려한 이펙트
    el.style.color='#e8c170';
    $('ghl').textContent='🎉 NEW HIGH SCORE! 🎉';
    $('ghl').style.fontSize='28px';
    $('ghl').style.animation='pulse 0.5s ease 3';
    // 반짝임 파티클
    for(let i=0;i<20;i++){
      setTimeout(()=>{sPart(C.W/2+Math.random()*200-100,C.H*0.3+Math.random()*60-30,['#e8c170','#f0e68c','#ff6b6b','#7a9e5a'][i%4],4);},i*80);
    }
  }else{
    el.style.color='';
    $('ghl').textContent='Best: '+G.hs.toLocaleString();
    $('ghl').style.fontSize='24px';
  }
  setTimeout(()=>{$('retryMsg').style.opacity='1';G.canRestart=true;},800);
}

// ══ UPDATE ══
function update(dt){
  if(phase!=='playing')return;
  const df=getDiff(),boost=G.boostT>0,stun=G.stunT>0;
  const sM=boost?df.spd*C.SAKE_SPEED_MULT:df.spd;
  if(boost)G.boostT=Math.max(0,G.boostT-dt*1000);
  if(boost&&G.boostT<=0)G.invT=2000; // 부스트 후 2초 무적
  if(stun)G.stunT=Math.max(0,G.stunT-dt*1000);
  if(G.invT>0)G.invT=Math.max(0,G.invT-dt*1000);
  if(!boost)G.hp-=df.decay*dt;
  if(G.hp<=0){G.hp=0;gOver();return;}
  if(stun){uPart(dt);uPop(dt);uHUD();return;}

  // Player X only
  const ps=boost?C.P_SPEED*C.SAKE_SPEED_MULT:C.P_SPEED;
  if(G.mouseIn&&!boost){const dx=G.mouseX-G.px;if(Math.abs(dx)>2){const mv=Math.min(ps*1.8,Math.abs(dx)*0.15);G.px+=Math.sign(dx)*mv;}}
  if(boost)G.px+=(C.W/2-G.px)*0.15; // 부스트 시 가운데로 부드럽게 이동
  G.px=Math.max(RL+C.P_SIZE/2,Math.min(RR-C.P_SIZE/2,G.px));

  const scr=C.BASE_SCROLL*sM;
  G.sOff+=scr;G.dist+=scr/C.PX_PER_M;G.score+=(scr/C.PX_PER_M)*C.SCORE_PER_M;

  // Spawn
  G.obsSpn-=dt;if(G.obsSpn<=0){G.obsSpn=df.spn;spObs();}
  G.avoSpn-=dt;if(G.avoSpn<=0){G.avoSpn=rR(C.AVO_SPAWN_MIN,C.AVO_SPAWN_MAX);spItem('avocado');}
  G.sakeSpn-=dt;if(G.sakeSpn<=0){G.sakeSpn=rR(C.SAKE_SPAWN_MIN,C.SAKE_SPAWN_MAX);spItem('sake');}

  // Move all obstacles down (all scroll-type now)
  G.obs=G.obs.filter(o=>{o.y+=scr;if(o.moving){const t=Date.now();if(o.type==='rock'){o.x=o.baseX+Math.sin(t*0.003+o.mPh)*o.mAmp;o.x=Math.max(RL,Math.min(RR-o.w,o.x));}else if(o.type==='bear'||o.type==='hook'){const newW=o.baseW+Math.sin(t*0.003+o.mPh)*o.mAmp;o.w=Math.max(C.W*0.3,Math.min(C.W*0.6,newW));if(o.side==='right')o.x=C.W-o.w;}}return o.y<C.H+100;});
  G.items=G.items.filter(i=>{i.y+=scr;return i.y<C.H+60;});

  chkColl();uPart(dt);uPop(dt);
  $('bg').style.opacity=boost?'1':'0';uHUD();
}

// ══ SPAWNING (모두 상단 스크롤) ══
const MIN_GAP=120; // 장애물/아이템 간 최소 Y 간격
function getMinY(){
  let minY=999;
  G.obs.forEach(o=>{if(o.y<minY)minY=o.y;});
  G.items.forEach(i=>{if(i.y<minY)minY=i.y;});
  return minY;
}
function canSpawnAt(y){return getMinY()>y+MIN_GAP;}
function rectsOverlap(a,b){return!(a.x+a.w<b.x||a.x>b.x+b.w||a.y+a.h<b.y||a.y>b.y+b.h);}
function shouldMove(){if(G.dist>=1000)return Math.random()<0.5;if(G.dist>=500)return Math.random()<0.3;return false;}
function spObs(){
  if(!canSpawnAt(-80))return;
  const r=Math.random();
  if(r<C.OBS_RATIO.rock)spRocks();
  else if(r<C.OBS_RATIO.rock+C.OBS_RATIO.hook)spSingle('hook');
  else spSingle('bear');
}
function spRocks(){
  const n=2+Math.floor(Math.random()*3);
  const gW=C.P_HITBOX*4+Math.random()*RW*0.2;
  const gS=RL+Math.random()*(RW-gW);
  const placed=[];
  for(let i=0;i<n;i++){
    const sz=C.ROCK_MIN+Math.random()*(C.ROCK_MAX-C.ROCK_MIN);
    const rh=sz*0.7;
    let x,y,ok=false;
    for(let t=0;t<12;t++){
      if(i<n/2)x=RL+Math.random()*Math.max(0,gS-RL-sz);
      else x=gS+gW+Math.random()*Math.max(0,RR-gS-gW-sz);
      x=Math.max(RL,Math.min(RR-sz,x));
      y=-sz-i*55-Math.random()*60; // 인덱스별 55px 간격 + 랜덤 60px
      const nr={x,y,w:sz,h:rh};
      const clashLocal=placed.some(p=>rectsOverlap(nr,p));
      const clashExist=G.obs.some(o=>o.y<50&&rectsOverlap(nr,o));
      if(!clashLocal&&!clashExist){ok=true;break;}
    }
    if(ok){
      placed.push({x,y,w:sz,h:rh});
      G.obs.push({type:'rock',x,y,w:sz,h:rh,v:Math.floor(Math.random()*3),moving:false,baseX:x,mPh:0,mAmp:0});
    }
  }
}
function spSingle(type){
  const side=Math.random()<0.5?'left':'right';
  const wPct=0.4+Math.random()*0.2;
  const w=C.W*wPct;
  const h=type==='bear'?70:35;
  const x=side==='left'?0:C.W-w;
  const mv=shouldMove();
  G.obs.push({type,x,y:-h-30,w,h,side,moving:mv,baseW:w,mPh:Math.random()*Math.PI*2,mAmp:40+Math.random()*40});
}
function spItem(t){
  if(!canSpawnAt(-40))return; // 장애물 바로 뒤에 안 나오도록
  const sz=t==='sake'?C.SAKE_SIZE:C.ITEM_SIZE;
  // X좌표도 장애물과 겹치지 않게 시도 (최대 5회)
  let x,tries=0;
  do{x=RL+30+Math.random()*(RW-60);tries++;}
  while(tries<5&&G.obs.some(o=>o.y<0&&o.y>-120&&Math.abs((o.x+o.w/2)-(x+sz/2))<o.w/2+sz));
  G.items.push({type:t,x,y:-40,size:sz});
}

// ══ COLLISIONS ══
function chkColl(){
  const px=G.px,py=G.py,pr=C.P_HITBOX,boost=G.boostT>0,inv=G.invT>0;
  G.items=G.items.filter(it=>{
    if(Math.sqrt((px-it.x)**2+(py-it.y)**2)<pr+it.size*0.45){
      if(it.type==='avocado'){G.st.avo++;sPart(it.x,it.y,'#7a9e5a',8);G.pops.push({t:'',img:'avocado',x:it.x,y:it.y,l:1,c:'#7a9e5a'});}
      else{G.hp=Math.min(C.HP_MAX,G.hp+C.SAKE_HP_HEAL);G.boostT=C.SAKE_BOOST_MS;G.st.sake++;sPart(it.x,it.y,'#e8c170',12);G.pops.push({t:'',img:'sake',x:it.x,y:it.y,l:1,c:'#e8c170'});}
      return false;
    }return true;
  });
  G.obs.forEach(o=>{
    const cx=o.x+o.w/2,cy=o.y+o.h/2;
    if(!rcC(o.x,o.y,o.w,o.h,px,py,pr))return;
    if(o.type==='rock'){
      if(boost)dObs(o);
      else if(!inv){G.hp-=C.HP_ROCK_DMG;G.invT=C.INVINCIBLE_MS;sPart(px,py,'#c47a6a',6);if(G.hp<=0){G.hp=0;gOver();}}
    }else if(o.type==='bear'){
      if(boost)dObs(o);else{sPart(px,py,'#8B6543',15);gOver();}
    }else if(o.type==='hook'){
      if(boost)dObs(o);else{G.stunT=C.HOOK_STUN_MS;sPart(px,py,'#8a9a8e',8);o.y=C.H+200;}
    }
  });
}
function dObs(o){sPart(o.x+o.w/2,o.y+o.h/2,'#e8c170',6);G.score+=C.SCORE_DESTROY;G.st.dest++;o.y=C.H+200;}
function rcC(rx,ry,rw,rh,cx,cy,cr){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh)),dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<cr*cr;}

// ══ PARTICLES ══
function sPart(x,y,c,n){for(let i=0;i<n;i++){if(G.parts.length>=C.PARTICLE_MAX)G.parts.shift();const a=Math.random()*Math.PI*2,s=1+Math.random()*3;G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:0.6+Math.random()*0.4,ml:1,c,sz:3+Math.random()*5});}}
function uPart(dt){G.parts=G.parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.l-=dt;return p.l>0;});}
function uPop(dt){G.pops=G.pops.filter(p=>{p.y-=40*dt;p.l-=dt;return p.l>0;});}

// ══ HUD ══
function uHUD(){
  $('ddT').textContent=Math.floor(G.dist)+'m';
  $('avoT').textContent='×'+G.st.avo;
  const hp=Math.max(0,Math.min(100,G.hp));
  $('hpI').style.width=hp+'%';
  $('hpI').style.backgroundColor=hp>60?'#6b9f5e':hp>30?'#d4a843':'#c45c4a';
  $('hpT').textContent='HP '+Math.floor(hp)+'%';
  // 물고기 아이콘 HP별 스프라이트 교체 + 배경색 동기화
  const f=$('hpFish'),bg=$('hpFishBg');
  const hpCol=hp>60?'#6b9f5e':hp>30?'#d4a843':'#c45c4a';
  bg.style.backgroundColor=hpCol;
  bg.style.borderColor=hpCol;
  if(hp>60){f.src=SS.faceNormal||'';f.style.animation='';}
  else if(hp>30){f.src=SS.faceTired||'';f.style.animation='';}
  else{f.src=SS.faceDanger||'';f.style.animation=hp>10?'':'pulse 0.4s infinite';}
}

// ══ RENDER ══
function render(){
  ctx.clearRect(0,0,C.W,C.H);
  rBG();rBanks();rObs();rItems();rPlayer();rParts();rPops();
  if(G.stunT>0&&phase==='playing'){
    ctx.fillStyle='rgba(60,80,60,0.2)';ctx.fillRect(0,0,C.W,C.H);
    ctx.font='700 28px Gaegu';ctx.fillStyle='#8a9a8e';ctx.textAlign='center';
    ctx.shadowColor='rgba(60,40,20,0.5)';ctx.shadowBlur=4;
    ctx.fillText('STUNNED!',C.W/2,C.H*0.3);
    ctx.font='600 20px Gaegu';ctx.fillText((G.stunT/1000).toFixed(1)+'s',C.W/2,C.H*0.3+32);
    ctx.shadowBlur=0;
  }
}
function rBG(){
  if(sp.bgTile){
    // 배경 이미지 전체 타일링 (강둑+강 통합, 하향 스크롤)
    const th=600;
    const off=Math.floor(G.sOff%th);
    for(let y=-th+off;y<C.H+th;y+=th){ctx.drawImage(sp.bgTile,0,y,C.W,th+1);}
  }else{
    const p=Math.min(1,G.dist/2000);
    const g=ctx.createLinearGradient(0,0,0,C.H);
    g.addColorStop(0,`rgb(${lerp(18,12,p)|0},${lerp(55,85,p)|0},${lerp(105,125,p)|0})`);
    g.addColorStop(1,`rgb(${lerp(12,18,p)|0},${lerp(35,65,p)|0},${lerp(75,105,p)|0})`);
    ctx.fillStyle=g;ctx.fillRect(0,0,C.W,C.H);
    // Ripples
    ctx.strokeStyle='rgba(120,210,255,0.07)';ctx.lineWidth=1;
    const rO=G.sOff%50;
    for(let y=-50+rO;y<C.H+50;y+=50){ctx.beginPath();for(let x=RL;x<RR;x+=4){const w=Math.sin((x+G.sOff*0.4)*0.04)*6;x===RL?ctx.moveTo(x,y+w):ctx.lineTo(x,y+w);}ctx.stroke();}
  }
}
function rBanks(){
  // 배경 이미지에 강둑이 포함되어 있으면 스킵
  if(sp.bgTile) return;
  const bOff=G.sOff;
  if(sp.bankTileL){
    const th=sp.bankTileL.height||200;const off=bOff%th;
    for(let y=-th+off;y<C.H+th;y+=th){ctx.drawImage(sp.bankTileL,0,y,C.BANK,th);}
  }else{
    let g=ctx.createLinearGradient(0,0,C.BANK,0);
    g.addColorStop(0,'#3d2b1f');g.addColorStop(0.6,'#5c4033');g.addColorStop(1,'#4a6741');
    ctx.fillStyle=g;ctx.fillRect(0,0,C.BANK,C.H);
  }
  if(sp.bankTileR){
    const th=sp.bankTileR.height||200;const off=bOff%th;
    for(let y=-th+off;y<C.H+th;y+=th){ctx.drawImage(sp.bankTileR,C.W-C.BANK,y,C.BANK,th);}
  }else{
    let g=ctx.createLinearGradient(C.W-C.BANK,0,C.W,0);
    g.addColorStop(0,'#4a6741');g.addColorStop(0.4,'#5c4033');g.addColorStop(1,'#3d2b1f');
    ctx.fillStyle=g;ctx.fillRect(C.W-C.BANK,0,C.BANK,C.H);
  }
  // Grass dots (이미지 없을 때만)
  if(!sp.bankTileL&&!sp.bankTileR){
    const tO=bOff%40;ctx.fillStyle='#5a7a50';
    for(let y=-40+tO;y<C.H+40;y+=40){
      for(let i=0;i<3;i++){const gx=8+i*18,gs=4+((y*0.7+i*3)%4);ctx.beginPath();ctx.arc(gx,y+i*12,gs,0,Math.PI*2);ctx.fill();const gx2=C.W-8-i*18;ctx.beginPath();ctx.arc(gx2,y+i*12,gs,0,Math.PI*2);ctx.fill();}
    }
  }
  // Water edge
  ctx.strokeStyle='rgba(100,180,220,0.25)';ctx.lineWidth=2;
  [RL,RR].forEach(bx=>{ctx.beginPath();for(let y=0;y<C.H;y+=3){const w=Math.sin((y+bOff)*0.05)*2;y===0?ctx.moveTo(bx+w,y):ctx.lineTo(bx+w,y);}ctx.stroke();});
}
function rPlayer(){
  ctx.save();
  const px=G.px,py=G.py,t=Date.now();
  const wg=G.stunT>0?Math.sin(t*0.02)*6:0;

  // ── 헤엄 물결 이펙트 (연어 뒤쪽) ──
  if(phase==='playing'&&G.stunT<=0){
    // 흰색 V자 물결 4단 (배경 대비 선명)
    for(let i=1;i<=4;i++){
      const dy=py+C.P_SIZE*0.4+i*16;
      const spread=12+i*10;
      const alpha=0.55-i*0.1;
      const waveOff=Math.sin(t*0.006+i*1.8)*5;
      ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
      ctx.lineWidth=3-i*0.5;
      ctx.beginPath();
      ctx.moveTo(px-spread+waveOff,dy);
      ctx.quadraticCurveTo(px+waveOff,dy-6,px+spread+waveOff,dy);
      ctx.stroke();
    }
    // 물방울 7개 (크고 밝게)
    for(let i=0;i<7;i++){
      const bx=px+Math.sin(t*0.005+i*1.1)*18;
      const by=py+C.P_SIZE*0.45+8+i*11;
      const br=3.5-i*0.35;
      const ba=0.5-i*0.06;
      if(br>0.5){
        ctx.fillStyle=`rgba(230,245,255,${ba})`;
        ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
        // 물방울 하이라이트
        ctx.fillStyle=`rgba(255,255,255,${ba*0.6})`;
        ctx.beginPath();ctx.arc(bx-br*0.3,by-br*0.3,br*0.35,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // ── 연어 본체 ──
  if(G.invT>0&&Math.floor(t/80)%2===0)ctx.globalAlpha=0.3;
  if(G.boostT>0){ctx.shadowColor='#e8c170';ctx.shadowBlur=30;}
  const alt=Math.floor(t/700)%2===0;
  let salmonKey;
  if(G.boostT>0)salmonKey='salmonBoost';
  else if(G.hp<=30)salmonKey=alt?'salmonDangerA':'salmonDangerB';
  else if(G.hp<=60)salmonKey=alt?'salmonTiredA':'salmonTiredB';
  else salmonKey=alt?'salmonA':'salmonB';
  const drawSz=G.boostT>0?C.P_SIZE*5:C.P_SIZE;
  dSp(salmonKey,px+wg,py,drawSz,drawSz,'🐟',drawSz);
  ctx.restore();
}
function rObs(){
  G.obs.forEach(o=>{ctx.save();
    if(o.type==='rock'){
      const rk=o.w>55?sp.rock2:sp.rock1;
      if(rk){ctx.drawImage(rk,o.x,o.y,o.w,o.h);}
      else{
        const cx=o.x+o.w/2,cy=o.y+o.h/2;
        // 동화풍 돌: 부드러운 곡선 + 크레용 질감
        ctx.fillStyle=['#8a9a8e','#9a8e7a','#7e8a7a'][o.v||0];
        ctx.beginPath();ctx.ellipse(cx,cy,o.w/2,o.h/2,0.1,0,Math.PI*2);ctx.fill();
        // 크레용 테두리
        ctx.strokeStyle='rgba(70,55,40,0.4)';ctx.lineWidth=2.5;
        ctx.setLineDash([3,2]);ctx.stroke();ctx.setLineDash([]);
        // 부드러운 하이라이트
        ctx.fillStyle='rgba(245,238,214,0.2)';
        ctx.beginPath();ctx.ellipse(cx-o.w*0.12,cy-o.h*0.15,o.w*0.28,o.h*0.2,-0.3,0,Math.PI*2);ctx.fill();
      }
    }
    if(o.type==='bear'){
      // 곰: 고정 크기 이미지, 위치만 이동하여 팔 길이 조절
      const img=sp.bear;
      const IW=375,IH=225; // 이미지 고정 크기 (2.5배)
      if(img){
        ctx.save();
        if(o.side==='right'){
          // 우측: 원본 (팔 왼쪽→강, 몸 오른쪽→강둑)
          ctx.drawImage(img,o.x,o.y-(IH-o.h),IW,IH);
        }else{
          // 좌측: 좌우반전 (팔 오른쪽→강, 몸 왼쪽→강둑)
          ctx.translate(o.x+o.w,0);ctx.scale(-1,1);
          ctx.drawImage(img,0,o.y-(IH-o.h),IW,IH);
        }
        ctx.restore();
      }else{
        const cy=o.y+o.h/2,r=o.h/2;
        ctx.fillStyle='#8B6543';
        ctx.beginPath();ctx.rect(o.side==='left'?o.x-50:o.x,o.y,o.w+50,o.h);ctx.fill();
        const tipCX=o.side==='left'?o.x+o.w:o.x;
        ctx.beginPath();ctx.arc(tipCX,cy,r,0,Math.PI*2);ctx.fill();
      }
    }
    if(o.type==='hook'){
      const cy=o.y+o.h/2;
      const tipX=o.side==='left'?o.x+o.w:o.x;
      const baseX=o.side==='left'?o.x:o.x+o.w;
      // 동화풍 낚싯줄: 손으로 그은 듯한 부드러운 선
      ctx.strokeStyle='#7a8a7e';ctx.lineWidth=2;ctx.lineCap='round';
      // 약간 떨리는 수평 줄
      ctx.beginPath();ctx.moveTo(baseX,cy);
      const segs=8;const segW=(tipX-baseX)/segs;
      for(let i=1;i<=segs;i++){
        const sx=baseX+segW*i;
        const sy=cy+Math.sin(i*1.2)*2.5;
        ctx.lineTo(sx,sy);
      }
      ctx.stroke();
      // 바늘: 손으로 그린 곡선 갈고리
      const hx=tipX,hy=cy;
      ctx.strokeStyle='#6b7a6e';ctx.lineWidth=2.5;
      ctx.beginPath();
      ctx.moveTo(hx,hy-14);ctx.lineTo(hx,hy+6);
      ctx.quadraticCurveTo(hx,hy+16,hx+(o.side==='left'?-10:10),hy+14);
      ctx.quadraticCurveTo(hx+(o.side==='left'?-14:14),hy+10,hx+(o.side==='left'?-8:8),hy+4);
      ctx.stroke();
      // 바늘 끝 (작은 점)
      ctx.fillStyle='#6b7a6e';
      ctx.beginPath();ctx.arc(hx,hy-14,2.5,0,Math.PI*2);ctx.fill();
      // 미끼 (귀여운 지렁이)
      ctx.strokeStyle='#c47a6a';ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(hx+(o.side==='left'?-5:5),hy+10);
      ctx.quadraticCurveTo(hx+(o.side==='left'?-12:12),hy+20,hx+(o.side==='left'?-4:4),hy+24);
      ctx.stroke();
    }
  ctx.restore();});
}
function rItems(){
  G.items.forEach(it=>{
    ctx.save();
    const fy=Math.sin(Date.now()*0.004+it.x)*4;
    const x=it.x,y=it.y+fy,s=it.size;

    // 아이템 강조: 동일 강도 글로우 (아보카도=녹색, 사케=금색)
    const pulse=0.6+Math.sin(Date.now()*0.005+it.x)*0.4;
    const isAvo=it.type==='avocado';
    const glowR=s*1.8;
    const glow=ctx.createRadialGradient(x,y,s*0.05,x,y,glowR);
    if(isAvo){
      glow.addColorStop(0,`rgba(220,250,160,${0.65*pulse})`);
      glow.addColorStop(0.35,`rgba(180,230,120,${0.35*pulse})`);
      glow.addColorStop(0.7,`rgba(150,210,100,${0.12*pulse})`);
    }else{
      glow.addColorStop(0,`rgba(250,220,150,${0.65*pulse})`);
      glow.addColorStop(0.35,`rgba(240,195,110,${0.35*pulse})`);
      glow.addColorStop(0.7,`rgba(220,170,90,${0.12*pulse})`);
    }
    glow.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=glow;
    ctx.beginPath();ctx.arc(x,y,glowR,0,Math.PI*2);ctx.fill();
    // 외곽 삼중 링
    const rc=isAvo?[180,240,120]:[240,195,110];
    ctx.strokeStyle=`rgba(${rc},${0.45*pulse})`;
    ctx.lineWidth=2.5;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.arc(x,y,s*0.6,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,s*0.85,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=1.5;ctx.strokeStyle=`rgba(${rc},${0.25*pulse})`;
    ctx.beginPath();ctx.arc(x,y,s*1.1,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);

    // 위치 적용
    ctx.translate(x,y);

    if(it.type==='avocado'){
      if(sp.avocado){ctx.drawImage(sp.avocado,-s/2,-s/2,s,s);}
      else{
        // 동화풍 아보카도
        ctx.fillStyle='#7a9e5a';
        ctx.beginPath();ctx.ellipse(0,0,s*0.38,s*0.48,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(60,70,40,0.5)';ctx.lineWidth=2;
        ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#5c7a3a';
        ctx.beginPath();ctx.ellipse(0,2,s*0.18,s*0.24,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8B6543';
        ctx.beginPath();ctx.arc(0,4,s*0.1,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(245,238,214,0.3)';
        ctx.beginPath();ctx.ellipse(-s*0.1,-s*0.15,s*0.12,s*0.18,-0.4,0,Math.PI*2);ctx.fill();
      }
    }else{
      if(sp.sake){ctx.drawImage(sp.sake,-s/2,-s/2,s,s);}
      else{
        // 동화풍 사케 병
        ctx.fillStyle='#d4c9a8';
        ctx.beginPath();ctx.roundRect(-s*0.22,-s*0.15,s*0.44,s*0.48,6);ctx.fill();
        ctx.fillStyle='#d4c9a8';
        ctx.beginPath();ctx.roundRect(-s*0.1,-s*0.4,s*0.2,s*0.3,3);ctx.fill();
        ctx.strokeStyle='rgba(92,64,51,0.5)';ctx.lineWidth=1.5;
        ctx.setLineDash([2,2]);
        ctx.beginPath();ctx.roundRect(-s*0.22,-s*0.15,s*0.44,s*0.48,6);ctx.stroke();
        ctx.beginPath();ctx.roundRect(-s*0.1,-s*0.4,s*0.2,s*0.3,3);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='#c45c4a';
        ctx.beginPath();ctx.roundRect(-s*0.15,-s*0.05,s*0.3,s*0.2,3);ctx.fill();
        ctx.fillStyle='#f5eed6';ctx.font=`${s*0.28}px Gaegu`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('酒',0,0.06*s);
        ctx.fillStyle='rgba(245,238,214,0.25)';
        ctx.beginPath();ctx.ellipse(-s*0.08,-s*0.22,s*0.06,s*0.15,-0.2,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.restore();
  });
}
function rParts(){G.parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.l/p.ml);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.l/p.ml),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function rPops(){G.pops.forEach(p=>{ctx.globalAlpha=Math.max(0,p.l);ctx.shadowColor='rgba(60,40,20,0.5)';ctx.shadowBlur=3;if(p.img&&sp[p.img]){const sz=30*Math.max(0,p.l);ctx.drawImage(sp[p.img],p.x-sz/2,p.y-sz/2,sz,sz);}else if(p.t){ctx.font='700 22px Gaegu';ctx.fillStyle=p.c;ctx.textAlign='center';ctx.fillText(p.t,p.x,p.y);}ctx.shadowBlur=0;});ctx.globalAlpha=1;}

// ══ LOOP & UTIL ══
function loop(now){requestAnimationFrame(loop);const dt=Math.min(0.05,(now-lt)/1000);lt=now;if(phase==='playing')update(dt);render();}
function rR(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function $(id){return document.getElementById(id);}
G.hs=loadHS();lt=performance.now();requestAnimationFrame(loop);
</script>
